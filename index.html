<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REVEL_CORE_v7.0_SACRIFICIO</title>
    <style>
        body { background-color: #050505; color: #33ff33; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .pc-case { background-color: #b0b0b0; border: 10px solid #707070; padding: 25px; width: 900px; height: 650px; box-shadow: 25px 25px 0px #000; position: relative; }
        .monitor { background-color: #000; border: 20px solid #222; height: 100%; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: inset 0 0 100px rgba(0,255,0,0.1); }
        
        #output { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 10px; scrollbar-width: none; }
        #output::-webkit-scrollbar { display: none; }
        .input-line { display: flex; border-top: 2px solid #111; padding-top: 10px; flex-shrink: 0; }
        input { background: transparent; border: none; color: inherit; font-family: inherit; font-size: 1.1rem; outline: none; width: 100%; text-transform: uppercase; }

        /* EFECTOS DE DESTRUCCIÓN */
        #crack { position: absolute; inset: 0; background: url('https://i.imgur.com/8Y6E7pT.png'); background-size: cover; display: none; z-index: 500; pointer-events: none; filter: invert(1); opacity: 0.9; }
        #static { position: absolute; inset: 0; background: url('https://media.giphy.com/media/oEI9uWUicG57q/giphy.gif'); display: none; z-index: 499; opacity: 0.6; }
        #countdown-box { position: absolute; inset: 0; background: rgba(0,0,0,0.9); color: #ff0000; display: none; z-index: 450; flex-direction: column; justify-content: center; align-items: center; font-size: 5rem; font-weight: bold; text-align: center; }

        #loader { position: absolute; inset: 0; background: #000; z-index: 600; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .bar { width: 350px; height: 20px; border: 2px solid #33ff33; margin-top: 15px; }
        #fill { width: 0%; height: 100%; background: #33ff33; }

        .red { color: #ff0000; font-weight: bold; }
        .sys { color: #ffff33; }
        .critical { animation: shake 0.1s infinite; border: 5px solid red; }
        @keyframes shake { 0% { transform: translate(3px,3px); } 50% { transform: translate(-3px,-3px); } 100% { transform: translate(3px,-3px); } }
    </style>
</head>
<body>

<div class="pc-case">
    <div id="loader">
        <h2>INICIANDO NÚCLEO...</h2>
        <div class="bar"><div id="fill"></div></div>
    </div>

    <div class="monitor" id="monitor-box">
        <div id="crack"></div>
        <div id="static"></div>
        <div id="countdown-box">
            <div id="timer-val">10.00</div>
            <div style="font-size: 1.5rem; color: white;">¡SISTEMA EN COLAPSO!</div>
            <div style="font-size: 1rem; color: yellow; margin-top: 10px;">INGRESE CÓDIGOS DE ESTABILIZACIÓN:</div>
            <input type="text" id="panic-input" style="border: 1px solid white; width: 60%; text-align: center; margin-top: 10px;" autofocus autocomplete="off">
        </div>

        <div id="output"></div>
        <div id="input-area" class="input-line">
            <span id="prompt">SYSTEM@SAUL:> </span>
            <input type="text" id="main-input" autofocus autocomplete="off">
        </div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const mainInput = document.getElementById('main-input');
    const panicInput = document.getElementById('panic-input');
    const loader = document.getElementById('loader');
    const fill = document.getElementById('fill');
    const countdownBox = document.getElementById('countdown-box');
    const timerVal = document.getElementById('timer-val');
    const monitor = document.getElementById('monitor-box');

    let isLogged = false, isPanic = false, panicStep = 1;
    let p = 0;

    // Carga inicial
    const loadInt = setInterval(() => {
        p += 5; if(p >= 100) { clearInterval(loadInt); loader.style.display='none'; addLog("BIENVENIDO SAUL. SISTEMA ONLINE."); }
        fill.style.width = p + "%";
    }, 40);

    function addLog(t, c="") {
        const d = document.createElement('div');
        if(c) d.className = c;
        d.innerText = "> " + t;
        output.appendChild(d);
        output.scrollTop = output.scrollHeight;
    }

    // LÓGICA DE ENTRADA PRINCIPAL
    mainInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const v = mainInput.value.toUpperCase().trim();
            mainInput.value = "";
            addLog(v);

            if(!isLogged) {
                if(v === "NEXUS_REVEL_2026") {
                    isLogged = true;
                    addLog("CONEXIÓN ESTABLECIDA.", "sys");
                } else { addLog("CLAVE INCORRECTA.", "red"); }
            } else {
                if(v === 'LISTA') {
                    addLog("ARCHIVOS:\n- MIKE_V4 (PURGA DE SEGURIDAD)\n- 1006_LOGS\n- PACO_CORE");
                } else if(v === 'HACK' || v === 'MIKE_V4') {
                    addLog("INICIANDO PURGA DE MIKE_V4...", "red");
                    addLog("ADVERTENCIA: ELIMINAR A MIKE COMPROMETE EL NÚCLEO.", "red");
                    setTimeout(startPanic, 1500);
                } else if(v === 'SCAN') {
                    addLog("DUEÑO: SAUL. ESTADO: PROTEGIDO.", "sys");
                } else if(v === 'CLEAR') { output.innerHTML = ""; }
                else { addLog("COMANDO NO RECONOCIDO."); }
            }
        }
    });

    // LÓGICA DE PÁNICO (CUENTA REGRESIVA)
    function startPanic() {
        isPanic = true;
        countdownBox.style.display = 'flex';
        monitor.classList.add('critical');
        panicInput.focus();
        
        let count = 10.00;
        const timer = setInterval(() => {
            count -= 0.05;
            timerVal.innerText = count.toFixed(2);
            
            if(count <= 0) {
                clearInterval(timer);
                endSystem();
            }
            if(!isPanic) { clearInterval(timer); }
        }, 50);
    }

    panicInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const v = panicInput.value.toUpperCase().trim();
            panicInput.value = "";
            
            if(panicStep === 1 && v === "BRAVO_6") {
                panicStep = 2;
                addLog("CÓDIGO 1 ACEPTADO.", "sys");
            } else if(panicStep === 2 && v === "REVEL_SHIELD") {
                panicStep = 3;
                addLog("CÓDIGO 2 ACEPTADO.", "sys");
            } else if(panicStep === 3 && v === "PACO_LIVE") {
                isPanic = false;
                countdownBox.style.display = 'none';
                monitor.classList.remove('critical');
                addLog("ESTABILIZACIÓN COMPLETA. MIKE HA SIDO BORRADO PARA SIEMPRE.", "sys");
            } else {
                addLog("ERROR EN CÓDIGO. EL TIEMPO SIGUE CORRIENDO.", "red");
            }
        }
    });

    function endSystem() {
        countdownBox.style.display = 'none';
        document.getElementById('crack').style.display = 'block'; 
        document.getElementById('static').style.display = 'block';
        setTimeout(() => { 
            document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%'>CONEXIÓN PERDIDA: SISTEMA DESTRUIDO</h1>"; 
            document.body.style.backgroundColor = "black"; 
        }, 3000);
    }
</script>
</body>
</html>
