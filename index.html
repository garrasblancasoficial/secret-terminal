<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REVEL_CORE_TERMINAL_V4.03</title>
    <style>
        body { background-color: #0a0a0a; color: #33ff33; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* El "Cuadrado" de la PC Vieja */
        .pc-case { background-color: #c0c0c0; border: 10px solid #808080; padding: 30px; width: 850px; height: 600px; box-shadow: 20px 20px 0px #000; position: relative; }
        
        /* MONITOR: Ahora con scroll automático corregido */
        .monitor { 
            background-color: #000; 
            border: 20px solid #333; 
            height: 100%; 
            padding: 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; /* Alineación vertical */
            justify-content: flex-end; /* Mantiene el input abajo */
        }

        /* Área de Texto: Esta es la que sube el contenido */
        #output { 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            white-space: pre-wrap; 
            font-size: 1.1rem; 
            margin-bottom: 5px;
            scrollbar-width: none; /* Oculta scroll en Firefox */
        }
        #output::-webkit-scrollbar { display: none; } /* Oculta scroll en Chrome/Edge */

        .input-line { 
            display: flex; 
            border-top: 2px solid #222; 
            padding-top: 10px; 
            flex-shrink: 0; /* Evita que el input se encoja */
        }
        
        input { background: transparent; border: none; color: #33ff33; font-family: inherit; font-size: 1.1rem; outline: none; width: 100%; }

        /* Pantalla de Carga */
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .progress-bar { width: 300px; height: 20px; border: 2px solid #33ff33; margin-top: 20px; }
        #progress-fill { width: 0%; height: 100%; background: #33ff33; }

        .hidden { display: none; }
        .error { color: #ff0000; }
        .sys { color: #ffff00; }
    </style>
</head>
<body>

<div class="pc-case">
    <div id="loading-screen">
        <h2 id="status-text">INICIANDO REVEL CORE...</h2>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <p id="percentage">0%</p>
    </div>

    <div class="monitor">
        <div id="output"></div>
        <div id="input-container" class="hidden">
            <div class="input-line">
                <span id="prompt">ACCESS_KEY:> </span>
                <input type="password" id="main-input" autofocus autocomplete="off">
            </div>
        </div>
    </div>
</div>

<script>
    const fill = document.getElementById('progress-fill');
    const percentText = document.getElementById('percentage');
    const loadingScreen = document.getElementById('loading-screen');
    const inputContainer = document.getElementById('input-container');
    const output = document.getElementById('output');
    const input = document.getElementById('main-input');
    const prompt = document.getElementById('prompt');

    let isLogged = false;
    let hackMode = false;
    let hackStep = 0;

    // Sonido Beep
    function playBeep() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.type = "square";
        osc.connect(gain);
        gain.connect(context.destination);
        osc.frequency.value = 880; 
        gain.gain.setValueAtTime(0.05, context.currentTime);
        osc.start();
        osc.stop(context.currentTime + 0.15);
    }

    // 1. Lógica de Carga corregida
    let progress = 0;
    const loadInterval = setInterval(() => {
        progress += Math.floor(Math.random() * 8) + 2;
        if (progress > 100) progress = 100;
        fill.style.width = progress + "%";
        percentText.innerText = progress + "%";

        if (progress === 100) {
            clearInterval(loadInterval);
            playBeep();
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                inputContainer.classList.remove('hidden');
                addTextToLog("SISTEMA OPERATIVO REVEL OS v4.03\nPROPIEDAD DE SAUL CORPORATION\n--------------------------------\nPOR FAVOR, IDENTIFÍQUESE.");
                input.focus();
            }, 500);
        }
    }, 80;

    function addTextToLog(text, className = "") {
        const div = document.createElement('div');
        if (className) div.className = className;
        div.innerText = text;
        output.appendChild(div);
        // Autoscroll: Mantiene el chat siempre abajo
        output.scrollTop = output.scrollHeight;
    }

    // 2. Procesador Universal
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            
            if (!isLogged) {
                if (val === "NEXUS_REVEL_2026") {
                    isLogged = true;
                    input.type = "text";
                    prompt.innerText = "SAUL@REVEL:\> ";
                    addTextToLog("\n[OK] ACCESO CONCEDIDO. BIENVENIDO, SAUL.\nEscriba 'AYUDA'.", "sys");
                } else {
                    addTextToLog("\n[ERROR] CLAVE INCORRECTA.", "error");
                }
            } else if (hackMode) {
                handleHack(val.toUpperCase());
            } else {
                handleGlobalCommands(val.toUpperCase());
            }

            input.value = "";
        }
    });

    function handleGlobalCommands(cmd) {
        addTextToLog(`\nSAUL@REVEL:\> ${cmd}`);
        switch(cmd) {
            case 'AYUDA':
                addTextToLog("- LISTA, HACK, SCAN, GARRAS, CLEAR, REBOOT");
                break;
            case 'LISTA':
                addTextToLog("C:\\REVEL_DATA\\:\n > REVEL_CORE.SYS\n > PROTOTIPO_1006.LOG\n > MIKE_OLD_FILES");
                break;
            case 'SCAN':
                addTextToLog("SISTEMA OPTIMIZADO PARA: SAUL.", "sys");
                break;
            case 'GARRAS':
                addTextToLog("[!] EL PROTOTIPO 1006 ESTÁ OBSERVANDO.", "error");
                break;
            case 'HACK':
                hackMode = true; hackStep = 1;
                addTextToLog("\n[MODO HACK ACTIVADO]\nPREGUNTA 1: ¿Quién es el dueño?", "sys");
                break;
            case 'CLEAR': output.innerHTML = ""; break;
            case 'REBOOT': location.reload(); break;
            default: addTextToLog(`Comando '${cmd}' no reconocido.`);
        }
    }

    function handleHack(val) {
        if (hackStep === 1) {
            if (val === "SAUL") {
                addTextToLog("IDENTIDAD OK.\nPREGUNTA 2: ¿Código de borrado?", "sys");
                hackStep = 2;
            } else { addTextToLog("HACK FALLIDO.", "error"); hackMode = false; }
        } else if (hackStep === 2) {
            if (val === "RESET TERMINAL 1") {
                addTextToLog("ACCESO AL NÚCLEO...\n¿BORRAR A MIKE_V4? (S/N)", "sys");
                hackStep = 3;
            } else { addTextToLog("CÓDIGO ERRÓNEO.", "error"); hackMode = false; }
        } else if (hackStep === 3) {
            if (val === "S" || val === "SI") {
                addTextToLog("ELIMINANDO A MIKE_V4... [OK]\nREGISTRO PURGADO DEFINITIVAMENTE.", "error");
            }
            hackMode = false;
        }
    }
</script>

</body>
</html>
