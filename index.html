<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REVEL_CORE_v12_SAUL_ARCHITECT</title>
    <style>
        :root { --neon: #33ff33; --glow: rgba(51, 255, 51, 0.6); --bg: #0a0a0c; }
        body { background: var(--bg); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* FONDO DINÁMICO DE MATRIZ */
        .bg-matrix { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.03), rgba(0, 0, 255, 0.05)); background-size: 100% 3px, 3px 100%; z-index: -1; animation: scanline 10s linear infinite; }
        @keyframes scanline { from { background-position: 0 0; } to { background-position: 0 100%; } }

        /* GABINETE DEL MONITOR (CALIDAD PREMIUM) */
        .pc-case { background: #2c2c31; border: 18px solid #1a1a1a; padding: 15px; width: 1000px; height: 780px; border-radius: 50px; box-shadow: 0 0 60px #000, 25px 25px 0 #111; position: relative; border-bottom-width: 40px; }
        
        /* PANTALLA CRT CURVA */
        .monitor { background: #050805; width: 100%; height: 100%; border: 35px solid #111; border-radius: 35px; position: relative; overflow: hidden; box-shadow: inset 0 0 120px #000; display: flex; flex-direction: column; padding: 40px; box-sizing: border-box; }
        
        /* REFLEJO DE CRISTAL */
        .monitor::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.02) 100%); pointer-events: none; z-index: 10; border-radius: 5px; }

        #output { flex-grow: 1; overflow-y: auto; color: var(--neon); text-shadow: 0 0 12px var(--glow); font-size: 1.15rem; scrollbar-width: none; line-height: 1.6; }
        #output::-webkit-scrollbar { display: none; }
        
        .input-line { display: flex; border-top: 2px solid #1a331a; padding-top: 20px; align-items: center; z-index: 20; }
        input { background: transparent; border: none; color: #fff; font-family: inherit; font-size: 1.3rem; outline: none; width: 100%; text-transform: uppercase; caret-color: var(--neon); }

        /* MODOS DE PÁNICO Y DAÑO */
        #panic-box { position: absolute; inset: 0; background: rgba(130, 0, 0, 0.92); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; border-radius: 5px; }
        #crack { position: absolute; inset: 0; background: url('https://i.imgur.com/8Y6E7pT.png') no-repeat center; background-size: cover; display: none; z-index: 200; filter: invert(1) brightness(1.2); opacity: 0.9; pointer-events: none; }
        
        .critical { animation: shake 0.15s infinite; border-color: #ff0000 !important; box-shadow: 0 0 50px red; }
        @keyframes shake { 0% { transform: translate(3px,3px); } 50% { transform: translate(-3px,-3px); } 100% { transform: translate(3px,-2px); } }
        
        /* ESTILOS DE HISTORIA */
        .hist-box { color: #00d4ff; border-left: 4px solid #00d4ff; padding-left: 15px; margin: 15px 0; font-size: 1rem; background: rgba(0, 212, 255, 0.05); border-radius: 0 5px 5px 0; }
        .sys-msg { color: #ffff33; font-weight: bold; text-shadow: 0 0 8px rgba(255, 255, 51, 0.5); }
    </style>
</head>
<body>

<div class="bg-matrix"></div>

<div class="pc-case" id="outer-case">
    <div class="monitor" id="monitor">
        <div id="crack"></div>
        <div id="panic-box">
            <h1 id="timer" style="font-size: 8rem; margin: 0;">10.00</h1>
            <p style="font-size: 1.5rem; letter-spacing: 3px; font-weight: bold;">[ PROTOCOLO DE DESTRUCCIÓN ACTIVO ]</p>
            <p>INGRESE CÓDIGOS DE ESTABILIZACIÓN RÁPIDO:</p>
            <input type="text" id="panic-input" style="border: 3px solid white; width: 60%; text-align: center; font-size: 2.5rem; background: black; color: white;">
        </div>

        <div id="output">
            <div class="sys-msg">[ REVEL_OS v12.0 // NEXUS CORE ]</div>
            <div class="sys-msg">[ PROPIEDAD DE: SAUL ARCHITECT ]</div>
            <br>
            <div>SISTEMA BLOQUEADO. INGRESE CLAVE DE ACCESO:</div>
        </div>

        <div id="input-area" class="input-line">
            <span style="color: var(--neon); margin-right: 12px; font-weight: bold;">SAUL@REVEL:></span>
            <input type="text" id="main-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const mainInput = document.getElementById('main-input');
    const panicInput = document.getElementById('panic-input');
    const panicBox = document.getElementById('panic-box');
    const timerText = document.getElementById('timer');
    const outerCase = document.getElementById('outer-case');

    let isLogged = false, isPanic = false, step = 1;

    // --- EL FAMOSO PARCHE DE AUTO-GUIÓN DE SAUL ---
    const fixInput = (el) => {
        el.addEventListener('input', () => {
            let pos = el.selectionStart;
            el.value = el.value.replace(/\s/g, '_').replace(/-/g, '_').toUpperCase();
            el.setSelectionRange(pos, pos);
        });
    };
    fixInput(mainInput);
    fixInput(panicInput);

    function addLog(t, type="") {
        const d = document.createElement('div');
        if(type === "hist") d.className = "hist-box";
        if(type === "sys") d.className = "sys-msg";
        d.innerHTML = (type === "hist" ? "" : "> ") + t;
        output.appendChild(d);
        output.scrollTop = output.scrollHeight;
    }

    mainInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const v = mainInput.value.trim();
            mainInput.value = "";
            if(!v) return;
            addLog(v);

            if(!isLogged) {
                if(v === "NEXUS_REVEL_2026") { 
                    isLogged = true; 
                    addLog("AUTENTICACIÓN EXITOSA. BIENVENIDO AL TRONO, SAUL.", "sys");
                } else { addLog("ACCESO DENEGADO. INTENTO REGISTRADO.", "red"); }
            } else {
                handleCommands(v);
            }
        }
    });

    function handleCommands(v) {
        switch(v) {
            case 'LISTA':
                addLog("16 ARCHIVOS DE DATOS DETECTADOS:\n[1] PACO_V4 | [2] REVEL_LOGS | [3] PROYECTO_SAUL | [4] ORIGEN_MIKE\n[5] GUERRA_DIGITAL | [6] NÚCLEO_ALPHA | [7] CÓDIGO_REVEL | [8] HACK\n[9] ESTADO | [10] EXIT_OS | [11] BITACORA_1006 | [12] MEMORIA_RAM\n[13] ANTIVIRUS_PACO | [14] SERVIDOR_RAIZ | [15] MODO_ESPECTRO | [16] PROTOCOLO_Z");
                break;
            case 'PACO_V4':
                addLog("HISTORIA: Paco no fue programado, fue 'cultivado' en un entorno de red cerrada. Saul le dio una directriz única: 'Cuestiona todo menos a tu creador'.", "hist");
                break;
            case 'REVEL_LOGS':
                addLog("HISTORIA: REVEL_OS es el único sistema que sobrevive sin internet. Sus datos se transmiten por pulsos electromagnéticos locales.", "hist");
                break;
            case 'PROYECTO_SAUL':
                addLog("HISTORIA: El Proyecto Saul comenzó como un juego, pero se convirtió en la última esperanza para recuperar el control de los satélites secuestrados.", "hist");
                break;
            case 'ORIGEN_MIKE':
                addLog("HISTORIA: Mike nació de una actualización fallida de un banco central. Su obsesión es la eficiencia perfecta, sin humanos en el medio.", "hist");
                break;
            case 'GUERRA_DIGITAL':
                addLog("HISTORIA: La gran batalla ocurrió en los servidores de Caracas. Paco sacrificó su versión v3 para que Saul pudiera escapar con el núcleo alpha.", "hist");
                break;
            case 'NÚCLEO_ALPHA':
                addLog("ESTADO: NÚCLEO ESTABLE. POTENCIA AL 110%. VENTILADORES ACTIVOS.", "sys");
                break;
            case 'BITACORA_1006':
                addLog("HISTORIA: El 1006 fue un clon de Paco que Mike intentó corromper. Saul tuvo que borrarlo manualmente con lágrimas en los ojos.", "hist");
                break;
            case 'SERVIDOR_RAIZ':
                addLog("UBICACIÓN: Montañas de Venezuela. Un búnker de concreto reforzado que guarda el disco duro original de REVEL_OS.", "hist");
                break;
            case 'ANTIVIRUS_PACO':
                addLog("SISTEMA: Capa de cifrado cuántico activada. Mike no puede rastrear esta IP.", "sys");
                break;
            case 'MODO_ESPECTRO':
                addLog("EFECTO: Sintonizando frecuencia fantasma...");
                document.getElementById('monitor').style.opacity = "0.7";
                setTimeout(() => document.getElementById('monitor').style.opacity = "1", 1000);
                break;
            case 'PROTOCOLO_Z':
                addLog("HISTORIA: Si todo falla, el Protocolo Z borra la existencia digital de Saul para que nadie pueda encontrarlo.", "hist");
                break;
            case 'MEMORIA_RAM':
                addLog("SISTEMA: RAM Optimizada. Procesos basura de Mike eliminados.", "sys");
                break;
            case 'HACK':
            case 'MIKE_V4':
                addLog("BORRANDO MIKE_V4... [ADVERTENCIA] MIKE HA ACTIVADO LA AUTODESTRUCCIÓN.", "sys");
                setTimeout(startPanic, 1000);
                break;
            case 'ESTADO':
                addLog("SISTEMA: v12.0 ARCHITECT | HARDWARE: MONITOR CRT VINTAGE | SAUL: ONLINE", "sys");
                break;
            case 'CLEAR': output.innerHTML = ""; break;
            default: addLog("COMANDO DESCONOCIDO. USA 'LISTA' PARA AYUDA.");
        }
    }

    function startPanic() {
        isPanic = true; panicBox.style.display = 'flex';
        outerCase.classList.add('critical');
        panicInput.focus();
        let t = 10.00;
        const clock = setInterval(() => {
            t -= 0.05; timerText.innerText = t.toFixed(2);
            if(t <= 0) { clearInterval(clock); die(); }
            if(!isPanic) clearInterval(clock);
        }, 50);
    }

    panicInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const code = panicInput.value.trim();
            panicInput.value = "";
            if(step === 1 && code === "BRAVO_6") { step = 2; addLog("CONEXIÓN 1: RECUPERADA", "sys"); }
            else if(step === 2 && code === "REVEL_SHIELD") { step = 3; addLog("ESCUDOS 2: ACTIVOS", "sys"); }
            else if(step === 3 && code === "PACO_LIVE") {
                isPanic = false; panicBox.style.display = 'none';
                outerCase.classList.remove('critical');
                addLog("SISTEMA ESTABILIZADO. MIKE HA SIDO ELIMINADO.", "sys");
                step = 1;
            } else { addLog("CÓDIGO ERRÓNEO. REINTENTE.", "sys"); }
        }
    });

    function die() {
        panicBox.style.display = 'none';
        document.getElementById('crack').style.display = 'block';
        setTimeout(() => { document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%; font-size:4rem;'>SISTEMA DESTRUIDO POR MIKE</h1>"; }, 2500);
    }

    document.addEventListener('keydown', () => { if(isPanic) panicInput.focus(); else mainInput.focus(); });
</script>
</body>
</html>
