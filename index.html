<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REVEL_CORE_v4.06_FINAL_SAUL</title>
    <style>
        body { background-color: #050505; color: #33ff33; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .pc-case { background-color: #b0b0b0; border: 10px solid #707070; padding: 25px; width: 850px; height: 600px; box-shadow: 20px 20px 0px #000; position: relative; }
        .monitor { background-color: #000; border: 20px solid #222; height: 100%; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,255,0,0.1); }
        
        /* Pantalla Corrupta */
        #corrupt-screen { position: absolute; inset: 0; background: rgba(160, 0, 0, 0.95); color: #fff; display: none; z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; animation: flicker 0.15s infinite; border: 5px solid red; }
        
        /* Minijuego */
        #game-box { position: absolute; inset: 20px; background: #000; border: 3px solid #33ff33; display: none; z-index: 110; flex-direction: column; align-items: center; justify-content: center; }
        canvas { border: 2px solid #33ff33; background: #0a0a0a; margin-top: 10px; }

        /* Terminal */
        #output { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 10px; color: #33ff33; }
        .input-line { display: flex; border-top: 2px solid #111; padding-top: 10px; }
        input { background: transparent; border: none; color: #33ff33; font-family: inherit; font-size: 1.1rem; outline: none; width: 100%; }

        /* Carga */
        #loader { position: absolute; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .bar { width: 300px; height: 20px; border: 2px solid #33ff33; margin-top: 15px; }
        #fill { width: 0%; height: 100%; background: #33ff33; }

        @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.85; } }
        .red-txt { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

<div class="pc-case">
    <div id="loader">
        <h2 id="load-msg">CARGANDO REVEL_CORE...</h2>
        <div class="bar"><div id="fill"></div></div>
    </div>

    <div class="monitor">
        <div id="corrupt-screen">
            <h1 style="text-shadow: 2px 2px #000;">ERROR: ID_CORRUPTO_1006</h1>
            <p>SISTEMA BLOQUEADO POR REINCIDENCIA</p>
            <p style="font-size: 0.8rem; margin-top: 20px; color: #ffcccc;">[!] Pulse 'R' para Reanimación Manual de Saul</p>
        </div>

        <div id="game-box">
            <h2 id="game-status">PRUEBA DE REFLEJOS</h2>
            <canvas id="gameCanvas" width="400" height="150"></canvas>
            <p style="font-size: 0.8rem; margin-top: 10px;">SALTA LOS BLOQUES CON [ESPACIO]</p>
        </div>

        <div id="output"></div>
        <div id="input-area" class="input-line">
            <span id="prompt">ACCESS_KEY:> </span>
            <input type="password" id="main-input" autofocus autocomplete="off">
        </div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('main-input');
    const loader = document.getElementById('loader');
    const fill = document.getElementById('fill');
    const corrupt = document.getElementById('corrupt-screen');
    const gameBox = document.getElementById('game-box');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let failed = 0;
    let isLogged = false;
    let isGameOn = false;
    let reanimateCode = "REVEL2026";

    // Sonido Beep
    function beep(f, d) {
        const c = new (window.AudioContext || window.webkitAudioContext)();
        const o = c.createOscillator(); const g = c.createGain();
        o.type = "square"; o.frequency.value = f;
        o.connect(g); g.connect(c.destination);
        g.gain.setValueAtTime(0.05, c.currentTime);
        o.start(); o.stop(c.currentTime + d);
    }

    // Lógica de Carga
    let p = 0;
    const loadInt = setInterval(() => {
        p += Math.floor(Math.random() * 10) + 1;
        if(p >= 100) {
            p = 100; clearInterval(loadInt);
            beep(880, 0.2);
            setTimeout(() => { loader.style.display = 'none'; addLog("BIENVENIDO AL NÚCLEO REVEL OS.\nINGRESE CREDENCIALES."); }, 800);
        }
        fill.style.width = p + "%";
    }, 60);

    function addLog(t, c="") {
        const d = document.createElement('div');
        if(c) d.className = c;
        d.innerText = "> " + t;
        output.appendChild(d);
        output.scrollTop = output.scrollHeight;
    }

    // Manejo de Inputs
    input.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const v = input.value.toUpperCase();
            input.value = "";
            if(!isLogged) {
                if(v === "NEXUS_REVEL_2026") {
                    isLogged = true; input.type = "text";
                    document.getElementById('prompt').innerText = "SAUL@REVEL:\> ";
                    addLog("ACCESO CONCEDIDO. BIENVENIDO SAUL.", "sys");
                } else if(v === reanimateCode) {
                    isLogged = true; failed = 0;
                    addLog("SISTEMA REANIMADO CON ÉXITO.", "sys");
                    input.type = "text"; document.getElementById('prompt').innerText = "SAUL@REVEL:\> ";
                } else {
                    failed++;
                    if(failed >= 3) { corrupt.style.display = 'flex'; input.disabled = true; beep(100, 1); }
                    else { addLog("CLAVE INCORRECTA. INTENTOS RESTANTES: " + (3-failed), "red-txt"); beep(200, 0.2); }
                }
            } else {
                addLog(v);
                if(v === "CLEAR") output.innerHTML = "";
            }
        }
    });

    // Iniciar Reanimación con 'R'
    window.addEventListener('keydown', (e) => {
        if(corrupt.style.display === 'flex' && e.key.toLowerCase() === 'r') {
            corrupt.style.display = 'none';
            gameBox.style.display = 'flex';
            initGame();
        }
    });

    // Minijuego de Paco
    let px = 50, py = 120, jumping = false, ox = 400;
    function initGame() {
        isGameOn = true;
        let timer = 0;
        const gLoop = setInterval(() => {
            if(!isGameOn) { clearInterval(gLoop); return; }
            ctx.clearRect(0,0,400,150);
            ctx.fillStyle = "#33ff33"; ctx.fillRect(px, py, 20, 20); // Saul
            ctx.fillStyle = "red"; ctx.fillRect(ox, 120, 20, 20); // Obstáculo
            ox -= 6; if(ox < -20) ox = 400;
            if(jumping) { py -= 6; if(py < 60) jumping = false; }
            else if(py < 120) py += 6;
            
            // Colisión
            if(ox < 70 && ox > 30 && py > 100) { ox = 400; beep(150, 0.1); }
            
            timer++;
            if(timer > 300) { // Ganar después de unos segundos
                isGameOn = false;
                gameBox.innerHTML = `<h3>REANIMACIÓN EXITOSA</h3><p>CÓDIGO: <b style="color:yellow">${reanimateCode}</b></p>`;
                setTimeout(() => { gameBox.style.display = 'none'; input.disabled = false; input.focus(); }, 4000);
            }
        }, 30);
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space' && py === 120) jumping = true; });
</script>

</body>
</html>
