<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REVEL_CORE_v9.0_INTEGRATED</title>
    <style>
        body { background: #050505; color: #33ff33; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .pc-case { background: #b0b0b0; border: 10px solid #707070; padding: 25px; width: 900px; height: 650px; box-shadow: 25px 25px 0 #000; position: relative; }
        .monitor { background: #000; border: 20px solid #222; height: 100%; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: inset 0 0 100px rgba(0,255,0,0.1); }
        
        #output { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; white-space: pre-wrap; font-size: 1.1rem; margin-bottom: 10px; scrollbar-width: none; line-height: 1.4; }
        #output::-webkit-scrollbar { display: none; }
        .input-line { display: flex; border-top: 2px solid #111; padding-top: 10px; }
        input { background: transparent; border: none; color: inherit; font-family: inherit; font-size: 1.1rem; outline: none; width: 100%; text-transform: uppercase; }

        /* EFECTOS ESPECIALES */
        #crack { position: absolute; inset: 0; background: url('https://i.imgur.com/8Y6E7pT.png') no-repeat center; background-size: cover; display: none; z-index: 500; filter: invert(1); opacity: 0.9; pointer-events: none; }
        #static { position: absolute; inset: 0; background: url('https://media.giphy.com/media/oEI9uWUicG57q/giphy.gif'); display: none; z-index: 499; opacity: 0.5; pointer-events: none; }
        #panic-box { position: absolute; inset: 0; background: rgba(200, 0, 0, 0.9); color: white; display: none; z-index: 450; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        .critical { animation: shake 0.1s infinite; border: 5px solid red !important; }
        @keyframes shake { 0% { transform: translate(2px,2px); } 50% { transform: translate(-2px,-2px); } 100% { transform: translate(2px,-2px); } }
    </style>
</head>
<body>

<div class="pc-case" id="case">
    <div class="monitor" id="monitor">
        <div id="crack"></div>
        <div id="static"></div>
        
        <div id="panic-box">
            <h1 id="timer">10.00</h1>
            <p>BORRADO DE MIKE DETECTADO: SISTEMA INESTABLE</p>
            <p>INGRESE CÓDIGOS DE REPARACIÓN:</p>
            <input type="text" id="panic-input" style="border: 2px solid white; width: 50%; text-align: center; font-size: 2rem; color: white;">
        </div>

        <div id="output"></div>
        <div id="input-area" class="input-line">
            <span id="prompt">REVEL@SAUL:> </span>
            <input type="text" id="main-input" autofocus autocomplete="off">
        </div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const mainInput = document.getElementById('main-input');
    const panicInput = document.getElementById('panic-input');
    const panicBox = document.getElementById('panic-box');
    const timerText = document.getElementById('timer');
    const monitor = document.getElementById('monitor');

    let isLogged = false, isPanic = false, step = 1;

    function addLog(t, c="") {
        const d = document.createElement('div');
        if(c) d.style.color = c;
        d.innerText = "> " + t;
        output.appendChild(d);
        output.scrollTop = output.scrollHeight;
    }

    /* --- PARCHE DE AUTO-GUION (ELIMINA EL PROBLEMA DE LA RAYITA) --- */
    const fixInput = (el) => {
        el.addEventListener('input', () => {
            let pos = el.selectionStart;
            el.value = el.value.replace(/\s/g, '_').replace(/-/g, '_').toUpperCase();
            el.setSelectionRange(pos, pos);
        });
    };
    fixInput(mainInput);
    fixInput(panicInput);

    /* --- MOTOR PRINCIPAL --- */
    mainInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const cmd = mainInput.value.trim();
            mainInput.value = "";
            if(!cmd) return;
            addLog(cmd);

            if(!isLogged) {
                if(cmd === "NEXUS_REVEL_2026") {
                    isLogged = true;
                    addLog("SISTEMA DESBLOQUEADO. BIENVENIDO SAUL.", "#ffff33");
                } else { addLog("CLAVE ERRÓNEA.", "red"); }
            } else {
                if(cmd === 'LISTA') {
                    addLog("ARCHIVOS:\n- MIKE_V4 (SISTEMA)\n- 1006_LOGS\n- PACO_CORE");
                } else if(cmd === 'MIKE_V4') {
                    addLog("BORRANDO MIKE_V4... FALLO CRÍTICO ENCONTRADO.", "red");
                    setTimeout(startPanic, 1000);
                } else if(cmd === '1006_LOGS') {
                    addLog("DETALLE: 1006 está observando desde el servidor raíz.");
                } else if(cmd === 'PACO_CORE') {
                    addLog("DETALLE: Paco está listo para defender a Saul.");
                } else if(cmd === 'CLEAR') {
                    output.innerHTML = "";
                } else {
                    addLog("COMANDO DESCONOCIDO. USA 'LISTA'.");
                }
            }
        }
    });

    /* --- SECUENCIA DE PÁNICO --- */
    function startPanic() {
        isPanic = true;
        panicBox.style.display = 'flex';
        monitor.classList.add('critical');
        panicInput.focus();
        let time = 10.00;
        const clock = setInterval(() => {
            time -= 0.05;
            timerText.innerText = time.toFixed(2);
            if(time <= 0) { clearInterval(clock); die(); }
            if(!isPanic) clearInterval(clock);
        }, 50);
    }

    panicInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const code = panicInput.value.trim();
            panicInput.value = "";
            if(step === 1 && code === "BRAVO_6") { step = 2; addLog("CÓDIGO 1: OK", "yellow"); }
            else if(step === 2 && code === "REVEL_SHIELD") { step = 3; addLog("CÓDIGO 2: OK", "yellow"); }
            else if(step === 3 && code === "PACO_LIVE") {
                isPanic = false;
                panicBox.style.display = 'none';
                monitor.classList.remove('critical');
                addLog("ESTABILIZACIÓN EXITOSA. MIKE HA SIDO ELIMINADO.", "#33ff33");
            } else { addLog("ERROR EN CÓDIGO.", "red"); }
        }
    });

    function die() {
        panicBox.style.display = 'none';
        document.getElementById('crack').style.display = 'block';
        document.getElementById('static').style.display = 'block';
        setTimeout(() => {
            document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%'>SISTEMA DESTRUIDO</h1>";
            document.body.style.backgroundColor = "black";
        }, 3000);
    }

    // Asegura que siempre puedas escribir
    document.addEventListener('click', () => {
        if(isPanic) panicInput.focus(); else mainInput.focus();
    });
</script>
</body>
</html>
