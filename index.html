<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REVEL_CORE_v15_OMEGA_ARCHITECT</title>
    <style>
        :root { 
            --neon: #33ff33; 
            --glow: rgba(51, 255, 51, 0.4); 
            --bg-crt: #060a06;
            --paco-blue: #00d4ff;
            --mike-red: #ff0000;
        }

        body { 
            background: #020202; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
        }

        /* --- ARQUITECTURA EXTERIOR --- */
        .pc-system {
            background: #2d2d32;
            border: 15px solid #1a1a1a;
            border-radius: 50px;
            padding: 30px;
            width: 1000px;
            height: 780px;
            box-shadow: 0 80px 150px #000, inset 0 0 40px #000;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bezel {
            background: #111;
            width: 98%;
            height: 85%;
            border-radius: 30px;
            padding: 35px;
            position: relative;
            box-shadow: inset 0 0 80px #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* --- PANTALLA CRT CURVA --- */
        .screen {
            background: var(--bg-crt);
            width: 100%;
            height: 100%;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: none; 
            flex-direction: column;
            padding: 30px;
            box-sizing: border-box;
            border: 3px solid #1a331a;
            transition: all 0.3s;
        }

        /* Efecto Antivirus Paco */
        .antivirus-on { box-shadow: inset 0 0 120px var(--paco-blue) !important; border-color: var(--paco-blue) !important; }

        /* Efecto Escaneo CRT */
        .screen::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
            z-index: 10;
            pointer-events: none;
            opacity: 0.8;
        }

        /* --- TERMINAL Y OUTPUT --- */
        #output { 
            flex-grow: 1; 
            overflow-y: auto; 
            color: var(--neon); 
            text-shadow: 0 0 8px var(--glow); 
            font-size: 1.15rem; 
            scrollbar-width: none; 
            line-height: 1.6;
        }
        #output::-webkit-scrollbar { display: none; }

        .input-line { 
            display: flex; 
            align-items: center; 
            border-top: 2px solid #1a331a; 
            padding-top: 20px; 
            margin-top: 15px;
            z-index: 20;
        }
        input { 
            background: transparent; border: none; color: #fff; 
            font-family: inherit; font-size: 1.3rem; outline: none; 
            width: 100%; text-transform: uppercase;
        }

        /* --- CONTROLES Y LEDS --- */
        .controls { 
            width: 100%; 
            height: 15%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 50px; 
            box-sizing: border-box; 
        }
        .led-group { display: flex; gap: 20px; }
        .led { width: 15px; height: 15px; border-radius: 50%; background: #1a0000; border: 2px solid #000; }
        .led.green { background: #3f3; box-shadow: 0 0 15px #3f3; }
        .led.orange { background: #ffaa00; box-shadow: 0 0 15px #ffaa00; }
        .led.red { background: #f33; box-shadow: 0 0 15px #f33; }

        .pwr-btn {
            width: 70px; height: 70px;
            background: #4a4a4f; border: 5px solid #111; border-radius: 10px;
            cursor: pointer; box-shadow: 4px 4px 0 #000;
            display: flex; justify-content: center; align-items: center;
            color: #222; font-weight: bold; font-size: 0.8rem;
            transition: 0.2s;
        }
        .pwr-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
        .pwr-btn.active { background: #ff7700; color: #fff; }

        /* --- MODOS CRÍTICOS --- */
        #panic-box {
            position: absolute; inset: 0; background: rgba(150, 0, 0, 0.95);
            display: none; z-index: 100; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center;
        }
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0%{transform:translate(2px,2px)} 50%{transform:translate(-2px,-2px)} 100%{transform:translate(2px,-2px)} }

        /* --- ESTILOS DE CATEGORÍAS --- */
        .cat-title { color: #ffff33; text-decoration: underline; font-weight: bold; margin-top: 15px; }
        .item-hist { color: #00d4ff; border-left: 3px solid #00d4ff; padding-left: 10px; margin: 8px 0; }
    </style>
</head>
<body>

<div class="pc-system" id="main-pc">
    <div class="bezel">
        <div id="panic-box">
            <h1 id="timer" style="font-size: 7rem; margin:0">10.00</h1>
            <p style="font-size: 1.5rem;">ALERTA: MIKE_V4 HA PENETRADO EL NÚCLEO</p>
            <p>INGRESE CÓDIGOS DE ESTABILIZACIÓN:</p>
            <input type="text" id="panic-input" style="border: 4px solid white; width: 60%; text-align: center; font-size: 2.5rem; background: black; color: white;">
        </div>

        <div class="screen" id="screen">
            <div id="output"></div>
            <div class="input-line">
                <span style="color:var(--neon); margin-right:12px; font-weight:bold;">SAUL@ROOT:></span>
                <input type="text" id="main-input" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="led-group">
            <div class="led" id="l1"></div>
            <div class="led" id="l2"></div>
            <div class="led" id="l3"></div>
        </div>
        <div style="color: #666; font-size: 0.9rem; letter-spacing: 3px; font-weight: bold;">REVEL_CORE v15.0 // OMEGA</div>
        <div class="pwr-btn" id="pwr-btn" onclick="bootProcess()">PWR</div>
    </div>
</div>

<script>
    // --- VARIABLES GLOBALES ---
    let audioCtx, fan, isPower = false, isLogged = false, pStep = 1;
    const output = document.getElementById('output');
    const mainInput = document.getElementById('main-input');
    const panicInput = document.getElementById('panic-input');
    const screen = document.getElementById('screen');

    // --- MOTOR DE AUDIO (WebAudio) ---
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Ruido de ventilador
            const bufferSize = 4096;
            const noise = audioCtx.createScriptProcessor(bufferSize, 1, 1);
            noise.onaudioprocess = (e) => {
                const out = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) out[i] = (Math.random() * 2 - 1) * 0.015;
            };
            noise.connect(audioCtx.destination);
            playBeep(440, 0.2);
        }
    }

    function playBeep(f, d) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + d);
    }

    // --- SISTEMA DE ARRANQUE ---
    function bootProcess() {
        if (isPower) return;
        isPower = true;
        initAudio();
        document.getElementById('pwr-btn').classList.add('active');
        document.getElementById('l1').classList.add('green');
        screen.style.display = 'flex';
        
        let bootLogs = [
            "REVEL_OS BIOS OMEGA v15.0",
            "CHECKING HARDWARE... [OK]",
            "MOUNTING BUNKER_VENEZUELA_01...",
            "ENCRYPTING SIGNAL... [OK]",
            "STARTING PACO_V4 CORE...",
            "LOGIN ARCHITECT:"
        ];
        
        let i = 0;
        const itv = setInterval(() => {
            log(bootLogs[i], "sys");
            i++;
            if (i >= bootLogs.length) clearInterval(itv);
        }, 800);
    }

    // --- REPARADOR DE COMANDOS (LIMPIEZA TOTAL) ---
    function clean(str) {
        return str.replace(/[\s_-]/g, "").toUpperCase();
    }

    function log(m, type = "") {
        const d = document.createElement('div');
        if (type === "hist") d.className = "item-hist";
        if (type === "sys") d.style.color = "#ffff33";
        d.innerHTML = (type === "hist" ? "" : "> ") + m;
        output.appendChild(d);
        output.scrollTop = output.scrollHeight;
    }

    // --- MANEJO DE ENTRADA ---
    mainInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const raw = mainInput.value.trim();
            const cmd = clean(raw);
            mainInput.value = "";
            if (!raw) return;
            log(raw);
            playBeep(200, 0.05);

            if (!isLogged) {
                if (cmd === "NEXUSREVEL2026") {
                    isLogged = true;
                    log("ACCESO TOTAL CONCEDIDO. BIENVENIDO SAUL.", "sys");
                    log("ESCRIBE 'LISTA' PARA CATEGORÍAS.");
                } else { log("ACCESO DENEGADO."); playBeep(150, 0.3); }
                return;
            }
            handleOmega(cmd);
        }
    });

    // --- GRAN MOTOR DE COMANDOS (TODO EN 1) ---
    function handleOmega(v) {
        switch(v) {
            case 'LISTA':
                log("< CATEGORÍAS REVEL >", "sys");
                log("1. LORE | 2. SISTEMA | 3. HACKS | 4. REPARACIÓN");
                break;
            case '1': case 'LORE':
                log("< ARCHIVOS DE HISTORIA >", "sys");
                log("PACO_V4: Tu IA protectora.", "hist");
                log("ORIGEN_MIKE: El error del sistema.", "hist");
                log("SERVIDOR_RAIZ: Búnker en Venezuela.", "hist");
                log("PROYECTO_GENESIS: Tu primer código.", "hist");
                break;
            case '2': case 'SISTEMA':
                log("< ESTADO DEL NÚCLEO >", "sys");
                log("STATUS: ONLINE | LOCAL: CARACAS_SUB", "hist");
                log("RED: SATÉLITE NEXUS-V5 ACTIVO", "hist");
                break;
            case '3': case 'HACKS':
                log("< COMANDOS DE ACCESO >", "sys");
                log("ANTIVIRUS_PACO | PROTOCOLO_Z | HACK | CLEAR");
                break;
            case 'ANTIVIRUSPACO':
                screen.classList.add('antivirus-on');
                log("ESCUDO PACO ACTIVADO. MIKE HA SIDO CEGADO.", "sys");
                document.getElementById('l2').classList.add('orange');
                setTimeout(() => {
                    screen.classList.remove('antivirus-on');
                    document.getElementById('l2').classList.remove('orange');
                }, 5000);
                break;
            case 'PROTOCOLOZ':
                output.innerHTML = "";
                log("EJECUTANDO PROTOCOLO Z... BORRANDO HUELLA...", "sys");
                setTimeout(() => log("REVEL_OS: SAUL ES AHORA INVISIBLE.", "hist"), 1500);
                break;
            case 'HACK': case 'MIKEV4':
                startPanic();
                break;
            case 'CLEAR': output.innerHTML = ""; break;
            default: log("ERROR: COMANDO NO RECONOCIDO EN v15.0");
        }
    }

    // --- SISTEMA DE PÁNICO ---
    function startPanic() {
        document.getElementById('panic-box').style.display = 'flex';
        document.getElementById('main-pc').classList.add('shake');
        let t = 10.00;
        const clock = setInterval(() => {
            t -= 0.05;
            document.getElementById('timer').innerText = t.toFixed(2);
            if (t <= 0) { clearInterval(clock); location.reload(); }
            if (document.getElementById('panic-box').style.display === 'none') clearInterval(clock);
        }, 50);
    }

    panicInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const v = clean(panicInput.value);
            panicInput.value = "";
            if (pStep === 1 && v === "BRAVO6") { pStep = 2; playBeep(800, 0.1); }
            else if (pStep === 2 && v === "REVELSHIELD") { pStep = 3; playBeep(800, 0.1); }
            else if (pStep === 3 && v === "PACOLIVE") {
                document.getElementById('panic-box').style.display = 'none';
                document.getElementById('main-pc').classList.remove('shake');
                log("MIKE EXPULSADO. NÚCLEO ESTABLE.", "sys");
                pStep = 1;
            }
        }
    });

    // --- AUTO-GUIÓN Y FOCO ---
    document.addEventListener('keydown', () => {
        if (document.getElementById('panic-box').style.display === 'flex') panicInput.focus();
        else mainInput.focus();
    });
    
    mainInput.addEventListener('input', () => {
        mainInput.value = mainInput.value.replace(/\s/g, "_").toUpperCase();
        playBeep(150, 0.02);
    });
</script>
</body>
</html>
