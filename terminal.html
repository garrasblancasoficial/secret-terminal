<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS TERMINAL | OVERRIDE_SAUL</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --t-green: #1aff1a;
            --t-glow: rgba(26, 255, 26, 0.4);
            --danger: #ff3333;
            --blue-panther: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', monospace;
            perspective: 1000px;
        }

        /* --- HARDWARE: LA PC EN LA OSCURIDAD --- */
        .pc-case {
            position: relative;
            width: 950px;
            height: 700px;
            background: #0a0a0a;
            border: 5px solid #1a1a1a;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 40px rgba(255,255,255,0.02);
            display: flex; justify-content: center; align-items: center;
        }

        .monitor {
            width: 100%; height: 100%;
            background: #000; border: 15px solid #151515;
            border-radius: 15px; position: relative;
            box-shadow: inset 0 0 80px #000;
            display: flex; flex-direction: column;
        }

        /* EFECTO CRT Y SCANLINES */
        .crt-layer {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 10; animation: flicker 0.1s infinite;
        }

        /* --- CONTENIDO DINÁMICO --- */
        .screen-ui {
            flex: 1; padding: 30px;
            display: flex; flex-direction: column;
            color: var(--t-green); text-shadow: 0 0 8px var(--t-glow);
        }

        #log-history {
            flex: 1; overflow-y: auto; font-size: 1.6rem;
            line-height: 1.1; margin-bottom: 10px;
        }

        .input-row { display: flex; gap: 15px; align-items: center; }
        #user-cmd {
            flex: 1; background: transparent; border: none;
            color: var(--t-green); font-family: 'VT323', monospace;
            font-size: 1.8rem; outline: none; text-transform: uppercase;
        }

        /* --- EVENTOS ESPECIALES (PANTERA, GLITCH) --- */
        #special-event {
            position: absolute; inset: 0; z-index: 100;
            display: none; justify-content: center; align-items: center;
            background: #000;
        }

        .panther-img { width: 80%; filter: drop-shadow(0 0 30px var(--blue-panther)); }

        @keyframes flicker { 0% { opacity: 0.98; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="pc-case">
        <div class="monitor">
            <div class="crt-layer"></div>
            
            <div id="special-event">
                <img id="panther-box" src="https://i.imgur.com/uC5nO3X.png" class="panther-img">
                </div>

            <div class="screen-ui">
                <div style="border-bottom: 2px solid var(--t-green); margin-bottom: 15px; font-size: 1.2rem;">
                    SAUL_SYSTEM_CORE // TERMINAL_DE_CONTROL_V3
                </div>

                <div id="log-history">
                    [KRNL]: SISTEMA INICIADO.<br>
                    IDENTIDAD CONFIRMADA: SAUL.<br>
                    ESTADO: ESPERANDO COMANDO DE HACKEO...<br>
                    ---------------------------------------
                </div>

                <div class="input-row">
                    <span>SAUL_USER_@:</span>
                    <input type="text" id="user-cmd" autofocus onkeypress="Kernel.run(event)">
                </div>
            </div>
        </div>
    </div>

    <script>
        /* --- NEXUS TERMINAL KERNEL v3.0 --- */
        const Kernel = {
            hackStep: 0,
            
            run(e) {
                if(e.key === 'Enter') {
                    const input = e.target.value.toUpperCase().trim();
                    const log = document.getElementById('log-history');
                    let r = "";

                    // LÓGICA DE HACKEO POR PASOS
                    if(this.hackStep > 0) {
                        this.handleHack(input);
                        e.target.value = "";
                        return;
                    }

                    // COMANDOS NORMALES
                    switch(input) {
                        case 'GARRAS BLANCAS 2026':
                            this.showPanther();
                            r = "<br>[!] ADVERTENCIA: ENTIDAD AZUL DETECTADA EN EL SECTOR 2026.";
                            break;

                        case 'HACK':
                            this.hackStep = 1;
                            r = "<br>---------------------------------------<br>[INICIANDO PROTOCOLO DE HACKEO]<br>PREGUNTA 1: ¿Quién es el dueño de Nexus Core?<br>> ";
                            break;

                        case 'RESET TERMINAL 1':
                            this.resetProtocol();
                            r = "<br>[SYSTEM]: BORRANDO REGISTROS DE PLAYTIME CO...<br>[SYSTEM]: BORRANDO EVIDENCIA DE HACKEO...<br>HECHO.";
                            break;

                        case 'LISTA':
                            r = "<br>> COMANDOS DISPONIBLES:<br>  - GARRAS BLANCAS 2026<br>  - HACK<br>  - RESET TERMINAL 1<br>  - AYUDA";
                            break;

                        case 'AYUDA':
                            r = "<br>Saul, usa los códigos de la lista para operar el sistema.";
                            break;

                        default:
                            r = `<br>ERROR: COMANDO '${input}' NO RECONOCIDO.`;
                    }

                    log.innerHTML += `<br><span style="color:#666">> ${input}</span>${r}`;
                    log.scrollTop = log.scrollHeight;
                    e.target.value = "";
                }
            },

            handleHack(input) {
                const log = document.getElementById('log-history');
                if(this.hackStep === 1) {
                    if(input === 'SAUL') {
                        log.innerHTML += `<br><span style="color:#666">> ${input}</span><br>RESPUESTA CORRECTA.<br>PREGUNTA 2: ¿Cuál es el código de reseteo?<br>> `;
                        this.hackStep = 2;
                    } else {
                        log.innerHTML += `<br>FALLO. HACKEO CANCELADO.`;
                        this.hackStep = 0;
                    }
                } else if(this.hackStep === 2) {
                    if(input === 'RESET TERMINAL 1') {
                        log.innerHTML += `<br><span style="color:#666">> ${input}</span><br>CÓDIGO ACEPTADO. ACCESO A DATOS SECRETOS CONCEDIDO.`;
                        this.hackStep = 0;
                        // Aquí podrías poner una imagen secreta o un video
                    } else {
                        log.innerHTML += `<br>ERROR DE CÓDIGO. BLOQUEANDO TERMINAL.`;
                        this.hackStep = 0;
                    }
                }
                log.scrollTop = log.scrollHeight;
            },

            showPanther() {
                const event = document.getElementById('special-event');
                event.style.display = 'flex';
                setTimeout(() => { event.style.display = 'none'; }, 2000);
            },

            resetProtocol() {
                const log = document.getElementById('log-history');
                document.body.style.filter = "invert(1)";
                setTimeout(() => {
                    document.body.style.filter = "none";
                    log.innerHTML = "---------------------------------------<br>[LOG]: BORRASTE AL PROTOTIPO 1006 DE LA MEMORIA.<br>[LOG]: BORRASTE LOS ARCHIVOS DE MIKE_V4.<br>[LOG]: TERMINAL LIMPIA PARA SAUL.<br>---------------------------------------";
                }, 1000);
            }
        };
    </script>
</body>
</html>
